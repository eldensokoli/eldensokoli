name: Generate Breakout Game

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Generate breakout SVGs
        run: node dist/cli.js "${{ github.repository_owner }}" "${{ secrets.GITHUB_TOKEN }}"
        env:
          INPUT_GITHUB_USERNAME: ${{ github.repository_owner }}
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push SVGs
        run: |
          cp output/light.svg example/light.svg
          cp output/dark.svg example/dark.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add example/light.svg example/dark.svg
          git diff --cached --quiet || git commit -m "Update breakout game SVGs"
          git push
